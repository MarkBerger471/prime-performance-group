<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#000"/>
    </linearGradient>
    <linearGradient id="tub" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="50%" stop-color="#111"/>
      <stop offset="100%" stop-color="#0d0d0d"/>
    </linearGradient>
    <linearGradient id="lid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#333"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="rgba(255,255,255,0)" />
      <stop offset="40%" stop-color="rgba(255,255,255,0.06)" />
      <stop offset="50%" stop-color="rgba(255,255,255,0.1)" />
      <stop offset="60%" stop-color="rgba(255,255,255,0.06)" />
      <stop offset="100%" stop-color="rgba(255,255,255,0)" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="rgba(255,255,255,0)"/>
      <stop offset="50%" stop-color="#f472b6"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="400" height="500" fill="url(#bg)"/>
  <!-- Subtle floor reflection -->
  <ellipse cx="200" cy="460" rx="120" ry="15" fill="rgba(255,255,255,0.02)"/>
  <!-- Tub body -->
  <rect x="115" y="140" width="170" height="260" rx="12" fill="url(#tub)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <!-- Shine overlay -->
  <rect x="115" y="140" width="170" height="260" rx="12" fill="url(#shine)"/>
  <!-- Lid -->
  <rect x="108" y="120" width="184" height="35" rx="8" fill="url(#lid)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <!-- Accent line -->
  <rect x="130" y="200" width="140" height="2" fill="url(#accent)" opacity="0.8" filter="url(#glow)"/>
  <!-- Brand text -->
  <text x="200" y="250" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-weight="800" font-size="28" fill="#C9C9C9" letter-spacing="8">PRIME</text>
  <!-- Product name -->
  <text x="200" y="290" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-weight="300" font-size="18" fill="white" letter-spacing="6">FOCUS</text>
  <!-- Accent line bottom -->
  <rect x="130" y="310" width="140" height="1" fill="url(#accent)" opacity="0.5"/>
  <!-- Subtitle -->
  <text x="200" y="340" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-weight="400" font-size="8" fill="rgba(255,255,255,0.4)" letter-spacing="3">NOOTROPIC PRE · 30 SERVINGS</text>
  <!-- Net weight -->
  <text x="200" y="380" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-weight="300" font-size="7" fill="rgba(255,255,255,0.2)" letter-spacing="2">PRIME PERFORMANCE GROUP</text>
  <!-- Edge highlight left -->
  <line x1="116" y1="155" x2="116" y2="385" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
</svg>