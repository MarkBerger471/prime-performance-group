<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#000"/>
    </linearGradient>
    <linearGradient id="tub" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="50%" stop-color="#111"/>
      <stop offset="100%" stop-color="#0d0d0d"/>
    </linearGradient>
    <linearGradient id="lid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#333"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="rgba(255,255,255,0)"/>
      <stop offset="40%" stop-color="rgba(255,255,255,0.06)"/>
      <stop offset="50%" stop-color="rgba(255,255,255,0.1)"/>
      <stop offset="60%" stop-color="rgba(255,255,255,0.06)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="rgba(255,255,255,0)"/>
      <stop offset="50%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="400" height="500" fill="url(#bg)"/>
  <ellipse cx="200" cy="460" rx="150" ry="15" fill="rgba(255,255,255,0.02)"/>
  <!-- Tub 1 (back left) -->
  <g opacity="0.6">
    <rect x="70" y="175" width="120" height="220" rx="10" fill="url(#tub)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <rect x="70" y="175" width="120" height="220" rx="10" fill="url(#shine)"/>
    <rect x="65" y="158" width="130" height="28" rx="6" fill="url(#lid)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <rect x="85" y="230" width="90" height="1.5" fill="url(#accent)" opacity="0.5"/>
    <text x="130" y="272" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-weight="800" font-size="16" fill="#C9C9C9" letter-spacing="4">PRIME</text>
  </g>
  <!-- Tub 2 (back right) -->
  <g opacity="0.6">
    <rect x="210" y="175" width="120" height="220" rx="10" fill="url(#tub)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <rect x="210" y="175" width="120" height="220" rx="10" fill="url(#shine)"/>
    <rect x="205" y="158" width="130" height="28" rx="6" fill="url(#lid)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <rect x="225" y="230" width="90" height="1.5" fill="url(#accent)" opacity="0.5"/>
    <text x="270" y="272" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-weight="800" font-size="16" fill="#C9C9C9" letter-spacing="4">PRIME</text>
  </g>
  <!-- Tub 3 (front center) -->
  <g>
    <rect x="140" y="155" width="120" height="240" rx="10" fill="url(#tub)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <rect x="140" y="155" width="120" height="240" rx="10" fill="url(#shine)"/>
    <rect x="134" y="137" width="132" height="30" rx="7" fill="url(#lid)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <rect x="155" y="215" width="90" height="2" fill="url(#accent)" opacity="0.8" filter="url(#glow)"/>
    <text x="200" y="260" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-weight="800" font-size="20" fill="#C9C9C9" letter-spacing="6">PRIME</text>
    <text x="200" y="288" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-weight="300" font-size="13" fill="white" letter-spacing="5">STACK</text>
    <rect x="155" y="300" width="90" height="1" fill="url(#accent)" opacity="0.5"/>
    <text x="200" y="323" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-weight="400" font-size="7" fill="rgba(255,255,255,0.4)" letter-spacing="2">COMPLETE BUNDLE · 3 PRODUCTS</text>
    <text x="200" y="370" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-weight="300" font-size="6" fill="rgba(255,255,255,0.2)" letter-spacing="2">PRIME PERFORMANCE GROUP</text>
  </g>
</svg>